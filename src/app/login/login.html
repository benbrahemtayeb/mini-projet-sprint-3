<style>
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }
  
    .mt-5 {
      margin-top: 50px;
    }
  
    .row {
      display: flex;
      flex-wrap: wrap;
    }
  
    .justify-content-md-center {
      justify-content: center;
    }
  
    .col-md-4 {
      width: 100%;
      max-width: 400px;
      padding: 0 15px;
    }
  
    .alert {
      padding: 15px;
      border-radius: 4px;
      margin-bottom: 20px;
    }
  
    .alert-danger {
      background-color: #fee2e2;
      border: 1px solid #ef4444;
      color: #991b1b;
    }
  
    form {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
  
    .form-group {
      margin-bottom: 20px;
    }
  
    label {
      display: block;
      font-weight: 600;
      margin-bottom: 8px;
      color: #333;
    }
  
    .form-control {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
    }
  
    .form-control:focus {
      outline: none;
      border-color: #4a5568;
    }
  
    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
    }
  
    .btn-primary {
      background-color: #4a5568;
      color: white;
    }
  
    .btn-lg {
      padding: 14px 32px;
    }
  
    .mt-3 {
      margin-top: 15px;
    }
  </style>
  
  <div class="container mt-5">
      <div class="row justify-content-md-center">
          <div class="col-md-4">
              @if(err==1) {
                <div class="alert alert-danger">
                  <strong>{{message}}</strong>
                </div>
              }
              <form>
                  <div class="form-group">
                      <label>Nom Utilisateur :</label>
                      <input type="text" name="username" class="form-control" [(ngModel)]="user.username">
                  </div>
                  <div class="form-group">
                      <label>Mot de passe :</label>
                      <input type="password" name="password" [(ngModel)]="user.password" class="form-control">
                  </div>
                  <div class="row justify-content-md-center">
                      <button type="button" (click)="onLoggedin()" class="btn btn-lg btn-primary mt-3">Connexion</button>
                  </div>
                  <p>Vous n'avez pas un compte? <a routerLink="/register">S'inscrire</a></p>
              </form>
          </div>
      </div>
  </div>
