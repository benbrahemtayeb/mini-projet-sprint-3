
<style>
.container { max-width: 1200px; margin: 0 auto; padding: 20px; }

.col-sm-4, .col-md-4, .col-lg-4 { width: 100%; max-width: 400px; padding: 0 15px; margin-bottom: 20px; }

.mb-4 { margin-bottom: 20px; }

.card { background: white; border-radius: 12px; overflow: hidden; border: 1px solid #e5e7eb; }

.card.shadow { box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }

.card-body { padding: 30px; }

.table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }

.table thead tr { background: #4f46e5; color: white; }

.table th { padding: 16px 12px; text-align: left; font-weight: 600; font-size: 13px; text-transform: uppercase; }

.table td { padding: 16px 12px; border-bottom: 1px solid #e5e7eb; color: #374151; vertical-align: middle; }

.table-striped tbody tr:nth-child(odd) { background-color: #f9fafb; }

.table tbody tr:hover { background-color: #f3f4f6; cursor: pointer; }

.btn { display: inline-block; padding: 10px 16px; border: none; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: 600; cursor: pointer; color: white; margin: 0 4px; }

.btn-success { background-color: #10b981; }

.btn-success:hover { background-color: #059669; }

.btn-danger { background-color: #ef4444; }

.btn-danger:hover { background-color: #dc2626; }

@media (max-width: 768px) {
  .container { padding: 15px 10px; }
  .card-body { padding: 20px; }
  .table th, .table td { padding: 12px 8px; font-size: 13px; }
  .btn { padding: 8px 12px; font-size: 12px; }
}
</style>
<div class="container">
    <div class="col-sm-4 col-md-4 col-lg-4 mb-4">
        <app-update-equipe [equipe]="updatedEqp" 
                           [ajout]="ajout"
                           (equipeUpdated)="equipeUpdated($event)"
                           [edit]="edit">
        </app-update-equipe>
    </div>
    <div class="card shadow mb-4">
        <div class="card-body">
            <table class="table table-striped">
                <thead>
                    <tr>
                        <th>Id</th>
                        <th>Nom Equipe</th>
                    </tr>
                </thead>
                @for(eqp of equipes; track eqp.idEquipe)
                {
                <tbody>
                    <tr>
                        <td>{{eqp.idEquipe}}</td>
                        <td>{{eqp.nomEquipe}}</td>
                        <td><a class="btn btn-success" (click)="updateEqp(eqp)">Editer</a></td>
                        <td><a class="btn btn-danger" (click)="supprimerEquipe(eqp)">Supprimer</a></td>
                    </tr>
                </tbody>
                }
            </table>
        </div>
    </div>
</div>
